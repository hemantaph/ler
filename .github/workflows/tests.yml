# Unit and integration tests (default pytest run omits ``slow`` benchmarks).
name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      NUMBA_CACHE_DIR: ${{ github.workspace }}/tests/.cache/numba
      MPLCONFIGDIR: ${{ github.workspace }}/tests/.cache/matplotlib
      LER_TEST_INTERPOLATOR_CACHE_DIR: ${{ github.workspace }}/tests/.cache/interpolators
    steps:
      # ler/rates/ler_data/*.zip are Git LFS; without LFS fetch the checkout
      # contains pointer text and ZipFile raises BadZipFile in conftest fixtures.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch and validate LFS test data
        run: |
          git lfs install --local
          git lfs pull --include="ler/rates/ler_data/interpolator_json.zip"
          python - <<'PY'
          import pathlib
          import zipfile

          path = pathlib.Path("ler/rates/ler_data/interpolator_json.zip")
          if not zipfile.is_zipfile(path):
              text = path.read_text(errors="ignore")[:200]
              raise SystemExit(
                  f"{path} is not a valid zip file. "
                  "Git LFS data was not fetched correctly. "
                  f"File starts with: {text!r}"
              )
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment from lockfile
        run: uv sync --locked --extra dev

      - name: Run tests (default excludes slow)
        run: uv run pytest tests/ --tb=short -q
