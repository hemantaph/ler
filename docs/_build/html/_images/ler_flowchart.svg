<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1320" viewBox="0 0 1680 1320" role="img" aria-labelledby="title desc">
  <title id="title">Internal workflow of ler</title>
  <desc id="desc">Flowchart showing how ler samples unlensed and lensed compact-binary populations, computes detection probabilities, and estimates event rates.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #102a43; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #486581; }
      .cluster-title { font: 700 19px Arial, Helvetica, sans-serif; fill: #102a43; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #102a43; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #334e68; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #486581; }
      .code { font: 600 13px Consolas, Menlo, monospace; fill: #243b53; }
      .box { stroke-width: 2.2; rx: 14; ry: 14; }
      .soft { fill: #ffffff; stroke: #bcccdc; }
      .api { fill: #e0f2fe; stroke: #0284c7; }
      .gw { fill: #ecfdf5; stroke: #059669; }
      .lens { fill: #fff7ed; stroke: #ea580c; }
      .image { fill: #f5f3ff; stroke: #7c3aed; }
      .rate { fill: #fef2f2; stroke: #dc2626; }
      .util { fill: #eef2ff; stroke: #4f46e5; }
      .output { fill: #fefce8; stroke: #ca8a04; }
      .cluster { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; rx: 22; ry: 22; }
      .arrow { fill: none; stroke: #334e68; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #627d98; stroke-width: 2; marker-end: url(#arrow-soft); }
      .arrow-dashed { fill: none; stroke: #627d98; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow-soft); }
      .split { fill: none; stroke: #829ab1; stroke-width: 2; stroke-dasharray: 5 7; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#627d98"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="1320"/>
  <text class="title" x="840" y="54" text-anchor="middle">How ler works internally</text>
  <text class="subtitle" x="840" y="84" text-anchor="middle">Population priors -> Monte Carlo samples -> detection probabilities -> observed rates</text>

  <!-- Public API and configuration -->
  <rect class="cluster" x="40" y="118" width="1600" height="165" filter="url(#shadow)"/>
  <text class="cluster-title" x="70" y="153">Public entry points and shared configuration</text>

  <rect class="box api" x="80" y="178" width="310" height="74"/>
  <text class="label" x="235" y="207" text-anchor="middle">GWRATES</text>
  <text class="code" x="235" y="230" text-anchor="middle">ler.rates.gwrates</text>
  <text class="tiny" x="235" y="246" text-anchor="middle">unlensed CBC simulation and rates</text>

  <rect class="box api" x="430" y="178" width="310" height="74"/>
  <text class="label" x="585" y="207" text-anchor="middle">LeR</text>
  <text class="code" x="585" y="230" text-anchor="middle">ler.rates.ler</text>
  <text class="tiny" x="585" y="246" text-anchor="middle">unlensed + strongly lensed rates</text>

  <rect class="box soft" x="790" y="165" width="385" height="96"/>
  <text class="label" x="982" y="192" text-anchor="middle">Run configuration</text>
  <text class="small" x="810" y="217">event_type: BBH, BNS, NSBH</text>
  <text class="small" x="810" y="238">cosmology, redshift range, priors, batch size</text>
  <text class="small" x="810" y="255">detectors, PSDs, pdet_finder, output JSON names</text>

  <rect class="box util" x="1220" y="165" width="370" height="96"/>
  <text class="label" x="1405" y="192" text-anchor="middle">Shared infrastructure</text>
  <text class="small" x="1240" y="217">FunctionConditioning interpolators</text>
  <text class="small" x="1240" y="238">batch_handler, JSON persistence</text>
  <text class="small" x="1240" y="255">multiprocessing and cached lookup tables</text>

  <!-- GW source population -->
  <rect class="cluster" x="40" y="330" width="760" height="360" filter="url(#shadow)"/>
  <text class="cluster-title" x="70" y="365">GW source population</text>

  <rect class="box gw" x="80" y="400" width="285" height="92"/>
  <text class="label" x="222" y="428" text-anchor="middle">Redshift model</text>
  <text class="code" x="222" y="450" text-anchor="middle">CBCSourceRedshiftDistribution</text>
  <text class="small" x="100" y="472">merger-rate density R(z)</text>
  <text class="small" x="100" y="489">dVc/dz and luminosity distance</text>

  <rect class="box gw" x="430" y="400" width="320" height="92"/>
  <text class="label" x="590" y="428" text-anchor="middle">Source parameters</text>
  <text class="code" x="590" y="450" text-anchor="middle">CBCSourceParameterDistribution</text>
  <text class="small" x="450" y="472">masses, spins, sky position, phase</text>
  <text class="small" x="450" y="489">detector-frame masses and distances</text>

  <rect class="box gw" x="180" y="555" width="460" height="82"/>
  <text class="label" x="410" y="584" text-anchor="middle">Unlensed CBC sample</text>
  <text class="code" x="410" y="606" text-anchor="middle">gw_parameters_rvs / gw_cbc_statistics</text>
  <text class="small" x="220" y="626">Monte Carlo draw of source population parameters</text>

  <!-- Lens population -->
  <rect class="cluster" x="880" y="330" width="760" height="520" filter="url(#shadow)"/>
  <text class="cluster-title" x="910" y="365">Strong-lensing branch used by LeR</text>

  <rect class="box lens" x="930" y="400" width="310" height="92"/>
  <text class="label" x="1085" y="428" text-anchor="middle">Lens optical depth</text>
  <text class="code" x="1085" y="450" text-anchor="middle">OpticalDepth</text>
  <text class="small" x="950" y="472">tau(zs), cross-section weighting</text>
  <text class="small" x="950" y="489">source redshift conditioned on lensing</text>

  <rect class="box lens" x="1280" y="400" width="310" height="92"/>
  <text class="label" x="1435" y="428" text-anchor="middle">Lens galaxy priors</text>
  <text class="code" x="1435" y="450" text-anchor="middle">LensGalaxyParameterDistribution</text>
  <text class="small" x="1300" y="472">zl, sigma, q, theta_E, gamma</text>
  <text class="small" x="1300" y="489">external shear and source position</text>

  <rect class="box lens" x="930" y="555" width="310" height="92"/>
  <text class="label" x="1085" y="583" text-anchor="middle">Lens model helpers</text>
  <text class="code" x="1085" y="605" text-anchor="middle">lens_functions / sampler_functions</text>
  <text class="small" x="950" y="627">velocity-dispersion and axis-ratio priors</text>
  <text class="small" x="950" y="644">rejection or importance sampling</text>

  <rect class="box image" x="1280" y="555" width="310" height="92"/>
  <text class="label" x="1435" y="583" text-anchor="middle">Image solver</text>
  <text class="code" x="1435" y="605" text-anchor="middle">ImageProperties</text>
  <text class="small" x="1300" y="627">image positions, magnifications</text>
  <text class="small" x="1300" y="644">time delays, Morse/image type</text>

  <rect class="box image" x="1065" y="710" width="410" height="88"/>
  <text class="label" x="1270" y="738" text-anchor="middle">Effective image-level GW parameters</text>
  <text class="code" x="1270" y="760" text-anchor="middle">lensed_sampling_routine</text>
  <text class="small" x="1100" y="782">effective distance, time, phase, RA, Dec</text>

  <!-- Detection and rates -->
  <rect class="cluster" x="40" y="910" width="1600" height="315" filter="url(#shadow)"/>
  <text class="cluster-title" x="70" y="945">Detection probability, selection, and saved products</text>

  <rect class="box rate" x="90" y="990" width="330" height="88"/>
  <text class="label" x="255" y="1018" text-anchor="middle">Detection probability</text>
  <text class="code" x="255" y="1040" text-anchor="middle">gwsnr.pdet or custom pdet_finder</text>
  <text class="small" x="115" y="1062">per-detector pdet and network pdet</text>

  <rect class="box rate" x="500" y="990" width="320" height="88"/>
  <text class="label" x="660" y="1018" text-anchor="middle">Selection</text>
  <text class="code" x="660" y="1040" text-anchor="middle">pdet_threshold / pdet_type</text>
  <text class="small" x="525" y="1062">boolean cut or probability weighting</text>

  <rect class="box rate" x="900" y="990" width="320" height="88"/>
  <text class="label" x="1060" y="1018" text-anchor="middle">Rate estimators</text>
  <text class="code" x="1060" y="1040" text-anchor="middle">gw_rate / unlensed_rate / lensed_rate</text>
  <text class="small" x="930" y="1062">observed rates and rate ratio</text>

  <rect class="box output" x="1300" y="990" width="290" height="88"/>
  <text class="label" x="1445" y="1018" text-anchor="middle">Outputs</text>
  <text class="code" x="1445" y="1040" text-anchor="middle">ler_data/*.json</text>
  <text class="small" x="1325" y="1062">parameters, detectable events, metadata</text>

  <rect class="box output" x="445" y="1135" width="790" height="58"/>
  <text class="label" x="840" y="1162" text-anchor="middle">Analysis layer</text>
  <text class="small" x="520" y="1184">rate comparison, plotting utilities, uncertainty studies, and downstream population analyses</text>

  <!-- Inheritance/flow connectors -->
  <path class="arrow" d="M 235 252 L 235 335 L 222 398"/>
  <path class="arrow" d="M 585 252 L 585 310 L 590 398"/>
  <path class="arrow" d="M 585 252 L 910 315 L 1085 398"/>
  <path class="arrow-soft" d="M 1175 213 L 1218 213"/>
  <path class="arrow-dashed" d="M 1405 261 L 1405 350"/>

  <path class="arrow" d="M 365 446 L 428 446"/>
  <path class="arrow" d="M 590 492 L 500 555"/>
  <path class="arrow" d="M 222 492 L 320 555"/>

  <path class="arrow" d="M 1240 446 L 1278 446"/>
  <path class="arrow" d="M 1085 492 L 1085 553"/>
  <path class="arrow" d="M 1435 492 L 1435 553"/>
  <path class="arrow" d="M 1240 601 L 1278 601"/>
  <path class="arrow" d="M 1435 647 L 1348 710"/>
  <path class="arrow" d="M 1085 647 L 1190 710"/>
  <path class="arrow-dashed" d="M 640 596 C 760 620, 910 700, 1063 748"/>

  <path class="arrow" d="M 410 637 C 360 740, 280 855, 255 988"/>
  <path class="arrow" d="M 1270 798 C 1140 870, 560 865, 255 988"/>
  <path class="arrow" d="M 420 1034 L 498 1034"/>
  <path class="arrow" d="M 820 1034 L 898 1034"/>
  <path class="arrow" d="M 1220 1034 L 1298 1034"/>
  <path class="arrow-soft" d="M 1060 1078 C 1025 1110, 950 1130, 890 1135"/>
  <path class="arrow-soft" d="M 660 1078 C 700 1110, 755 1128, 810 1135"/>
  <path class="arrow-dashed" d="M 1405 1078 C 1325 1140, 1220 1165, 1237 1165"/>

  <!-- Side notes -->
  <rect class="box soft" x="70" y="1245" width="1540" height="46"/>
  <text class="small" x="90" y="1272">Dashed arrows show cached/helper data paths. Solid arrows show the main sampling and rate-calculation flow. The lensed branch reuses the GW source-population machinery and adds lens-galaxy sampling plus image-level transformations before detection.</text>
</svg>
