<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive EPL+Shear Lens Configuration</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Source Serif 4", "Crimson Pro", "Georgia", serif;
      background: #fff; color: #333; display: flex; flex-direction: column;
      align-items: center; padding: 6px;
    }
    .wrapper { width: 520px; display: flex; flex-direction: column; align-items: center; }
    canvas { display: block; }
    .row2 { width: 520px; display: flex; gap: 10px; margin-top: 4px; align-items: flex-start; }
    .legend-panel {
      flex: 0 0 250px; font-size: 12px; line-height: 1.5; border-radius: 5px;
      padding: 8px 10px; background: #E9EBF2;
    }
    .legend-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #222; }
    .legend-item { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 2px; }
    .legend-img-detail { font-size: 11.5px; line-height: 1.45; }
    .legend-swatch { display: inline-block; width: 26px; min-width: 26px; height: 0; }
    .legend-star { font-size: 15px; min-width: 18px; text-align: center; }
    .legend-sub { font-size: 9px; vertical-align: sub; }
    .sliders-panel { flex: 1; display: flex; flex-direction: column; gap: 3px; padding: 4px 0; }
    .slider-row { display: flex; align-items: center; gap: 6px; height: 26px; }
    .slider-row .lbl { min-width: 24px; text-align: right; font-size: 14px; font-weight: 500; }
    .slider-row input[type="range"] { flex: 1; cursor: pointer; height: 5px; }
    .slider-row .val { min-width: 44px; font-size: 13px; font-family: monospace; }
  </style>
</head>

<body>
  <div class="wrapper">
    <canvas id="canvas"></canvas>
    <div class="row2">
      <div class="legend-panel" id="legend"></div>
      <div class="sliders-panel">
        <div class="slider-row"><span class="lbl">q:</span><input type="range" id="s_q" min="0.1" max="0.99" step="0.01" value="0.60"><span class="val" id="v_q">0.60</span></div>
        <div class="slider-row"><span class="lbl">φ:</span><input type="range" id="s_phi" min="0" max="3.14159" step="0.01" value="0.52"><span class="val" id="v_phi">0.52</span></div>
        <div class="slider-row"><span class="lbl">γ:</span><input type="range" id="s_gamma" min="1.5" max="2.5" step="0.01" value="1.84"><span class="val" id="v_gamma">1.84</span></div>
        <div class="slider-row"><span class="lbl">γ₁:</span><input type="range" id="s_g1" min="-0.2" max="0.2" step="0.01" value="-0.05"><span class="val" id="v_g1">-0.05</span></div>
        <div class="slider-row"><span class="lbl">γ₂:</span><input type="range" id="s_g2" min="-0.2" max="0.2" step="0.01" value="-0.05"><span class="val" id="v_g2">-0.05</span></div>
        <div class="slider-row"><span class="lbl">βₓ:</span><input type="range" id="s_bx" min="-1.5" max="1.5" step="0.05" value="-0.25"><span class="val" id="v_bx">-0.25</span></div>
        <div class="slider-row"><span class="lbl">βᵧ:</span><input type="range" id="s_by" min="-1.5" max="1.5" step="0.01" value="0.04"><span class="val" id="v_by">0.04</span></div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    // ===== Complex Math Helpers =====
    function cmul(a, b) { return [a[0] * b[0] - a[1] * b[1], a[0] * b[1] + a[1] * b[0]]; }
    function cadd(a, b) { return [a[0] + b[0], a[1] + b[1]]; }
    function cabs(z) { return Math.sqrt(z[0] * z[0] + z[1] * z[1]); }
    function cexp_i(t) { return [Math.cos(t), Math.sin(t)]; }
    function cscale(s, z) { return [s * z[0], s * z[1]]; }
    function cdot(a, b) { return a[0] * b[0] + a[1] * b[1]; }

    // ===== Python cross_section_njit.py Equivalents =====
    function phi_q2_ellipticity(p, q) { 
        const e = (1 - q) / (1 + q);
        return [e * Math.cos(2 * p), e * Math.sin(2 * p)]; 
    }
    function ellipticity2phi_q(e1, e2) { 
        const p = Math.atan2(e2, e1) / 2; 
        const c = Math.min(Math.sqrt(e1 * e1 + e2 * e2), 0.9999); 
        return [p, (1 - c) / (1 + c)]; 
    }
    function shear_c2p(g1, g2) { return [Math.atan2(g2, g1) / 2, Math.sqrt(g1 * g1 + g2 * g2)]; }
    function shear_p2c(p, g) { return [g * Math.cos(2 * p), g * Math.sin(2 * p)]; }
    
    // Polar -> Elliptical
    function pol2ell(r, th, q) { 
        return [r * Math.sqrt(q * q * Math.cos(th) ** 2 + Math.sin(th) ** 2), Math.atan2(Math.sin(th), Math.cos(th) * q)]; 
    }
    function pol2cart(r, th) { return [r * Math.cos(th), r * Math.sin(th)]; }
    function cart2pol(x, y) { return [Math.sqrt(x * x + y * y), ((Math.atan2(y, x) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI)]; }
    function rotmat(th) { const c = Math.cos(th), s = Math.sin(th); return [[c, s], [-s, c]]; }
    function mv(M, v) { return [M[0][0] * v[0] + M[0][1] * v[1], M[1][0] * v[0] + M[1][1] * v[1]]; }

    // Cosmology (flat ΛCDM) - For mapping tau to real days
    const COSMO = { H0: 70, Om: 0.3, OL: 0.7, sigma: 160.0, zl: 0.8, zs: 3.0 };
    const C_KMS = 299792.458; 
    const MPC_TO_KM = 3.0857e19; 

    function comovingDist(z) {
      const N = 1000, dz = z / N; let sum = 0;
      for (let i = 0; i < N; i++) {
        const z1 = i * dz, z2 = (i + 1) * dz;
        const E1 = Math.sqrt(COSMO.Om * (1 + z1) ** 3 + COSMO.OL);
        const E2 = Math.sqrt(COSMO.Om * (1 + z2) ** 3 + COSMO.OL);
        sum += 0.5 * (1 / E1 + 1 / E2) * dz;
      }
      return (C_KMS / COSMO.H0) * sum;
    }

    const chi_l = comovingDist(COSMO.zl), chi_s = comovingDist(COSMO.zs);
    const D_l = chi_l / (1 + COSMO.zl), D_s = chi_s / (1 + COSMO.zs);
    const D_ls = (chi_s - chi_l) / (1 + COSMO.zs); 
    const theta_E_phys = 4 * Math.PI * (COSMO.sigma / C_KMS) ** 2 * D_ls / D_s;
    const D_dt = (1 + COSMO.zl) * D_l * D_s / D_ls;
    const c_Mpc_day = C_KMS * 86400 / MPC_TO_KM;
    const TD_FACTOR = D_dt * theta_E_phys * theta_E_phys / c_Mpc_day;

    // ===== Python epl_shear_njit.py Equivalents =====
    function omega(phi, t, q) {
      // Mirrors Python's `omega_scalar` convergence kernel
      const f = (1 - q) / (1 + q);
      if (f <= 1e-16) return [Math.cos(phi), Math.sin(phi)];

      const ni = Math.min(200, Math.floor(Math.log(1e-16) / Math.log(Math.abs(f) + 1e-30)) + 2);
      let Om = [Math.cos(phi), Math.sin(phi)];
      const fc = cscale(-f, cexp_i(2 * phi));
      let res = [0, 0];
      for (let n = 1; n < ni; n++) { 
        res = cadd(res, Om); 
        Om = cscale((2 * n - (2 - t)) / (2 * n + (2 - t)), cmul(Om, fc)); 
      }
      return cadd(res, Om);
    }

    function alpha_epl(x, y, b, q, t, Om) {
      // Mirrors Python: alph = (2* b**t)/(1 + q) * R**(1-t) * Omega
      const R = cabs([x * q, y]);
      const pf = (2 * Math.pow(b, t)) / (1 + q);
      let fr = R > 1e-15 ? Math.pow(R, 1 - t) : 0; 
      if (!isFinite(fr)) fr = 0;
      return cscale(pf * fr, Om);
    }

    function alpha_es(x, y, b, q, t, g1, g2, Om) {
      // Mirrors Python: alph + (gamma1 * x + gamma2 * y) + 1j * (gamma2 * x - gamma1 * y)
      const a = alpha_epl(x, y, b, q, t, Om);
      return [a[0] + g1 * x + g2 * y, a[1] + g2 * x - g1 * y];
    }

    function sqeq(a, b, c) {
      // Mirrors _solvequadeq
      const d = b * b - 4 * a * c; if (d < 0) return [NaN, NaN];
      const s = Math.sqrt(d), sg = b >= 0 ? 1 : -1, dn = -b - sg * s;
      if (b !== 0) { if (a !== 0) return [dn / (2 * a), 2 * c / dn]; return [-c / b, -c / b + 1e-8]; }
      const sq = Math.sqrt(-c / a); return [-sq, sq];
    }

    // ===== Caustics Generator =====
    function computeCaustics(qi, pi, gp, g1u, g2u) {
      const [e1, e2] = phi_q2_ellipticity(pi, qi);
      const [te, q] = ellipticity2phi_q(e1, e2);
      let [tg, gm] = shear_c2p(g1u, g2u);
      const b = Math.sqrt(q); tg -= te;
      const [g1, g2] = shear_p2c(tg, gm);
      const M = rotmat(-te), t = gp - 1, mi = -100, N = 500;
      const x4 = [], y4 = [], xc = [], yc = [], xd = [], yd = [], xq = [], yq = [];
      const rC = [], tC = [], r4 = [], t4 = [];
      
      for (let i = 0; i < N; i++) {
        const th = (2 * Math.PI * i) / N;
        const [R, ph] = pol2ell(1, th, q);
        const Om = omega(ph, t, q), fr = 1 / R; 
        const et = cexp_i(th), e2t = cexp_i(2 * th);
        
        let aa = 1 - (g1 * g1 + g2 * g2); 
        let bb = -(2 - t);
        let cc = (1 - t) * (2 - t) * cdot(et, Om) / fr * 2 / (1 + q);
        cc -= (1 - t) ** 2 * (2 / (1 + q)) ** 2 * (Om[0] * Om[0] + Om[1] * Om[1]) / fr ** 2;
        
        const gre = -e2t[0] * (2 - t) / 2 + (1 - t) * et[0] * 2 / (1 + q) * Om[0] / fr - (1 - t) * et[1] * 2 / (1 + q) * Om[1] / fr;
        const gim = -e2t[1] * (2 - t) / 2 + (1 - t) * et[0] * 2 / (1 + q) * Om[1] / fr + (1 - t) * et[1] * 2 / (1 + q) * Om[0] / fr;
        bb -= 2 * (g1 * gre + g2 * gim);
        
        const [u1_4, u2_4] = sqeq(cc, bb, aa);
        const u2 = u2_4 > 0 ? u2_4 : u1_4;
        let xr4 = NaN, yr4 = NaN;
        if (isFinite(u2) && u2 > 0) { const r = b * Math.pow(u2, -1 / t) * fr; [xr4, yr4] = pol2cart(r, th); }
        
        let xrc = NaN, yrc = NaN;
        if (t > 1) {
          const [u1c, u2c] = sqeq(cc, bb, aa - mi);
          const uc = u2c > 0 ? u2c : u1c;
          if (isFinite(uc) && uc > 0) { const r = b * Math.pow(uc, -1 / t) * fr;[xrc, yrc] = pol2cart(r, th); }
        }
        else {
          const [u1c, u2c] = sqeq(cc, bb, aa + mi);
          const uc = u1c > 0 ? u1c : u2c;
          if (isFinite(uc) && uc > 0) { const r = b * Math.pow(uc, -1 / t) * fr;[xrc, yrc] = pol2cart(r, th); }
        }
        
        let xa4 = NaN, ya4 = NaN, xac = NaN, yac = NaN;
        if (isFinite(xr4)) { const O = omega(Math.atan2(yr4, xr4 * q), t, q); const a = alpha_es(xr4, yr4, b, q, t, g1, g2, O); xa4 = xr4 - a[0]; ya4 = yr4 - a[1]; }
        if (isFinite(xrc)) { const O = omega(Math.atan2(yrc, xrc * q), t, q); const a = alpha_es(xrc, yrc, b, q, t, g1, g2, O); xac = xrc - a[0]; yac = yrc - a[1]; }
        let p4_ = mv(M, [xa4, ya4]), pc_ = mv(M, [xac, yac]);
        x4.push(p4_[0]); y4.push(p4_[1]); xc.push(pc_[0]); yc.push(pc_[1]);
        const [rr4, tt4] = cart2pol(xa4, ya4), [rrc, ttc] = cart2pol(xac, yac);
        r4.push(rr4); t4.push(tt4); rC.push(rrc); tC.push(ttc);
      }
      for (let i = 0; i < N; i++) {
        const th = t4[i], r2 = interp(th, tC, rC, 2 * Math.PI);
        const rD = Math.max(r4[i], r2), rQ = Math.min(r4[i], r2);
        const pd = mv(M, pol2cart(rD, th)), pq = mv(M, pol2cart(rQ, th));
        xd.push(pd[0]); yd.push(pd[1]); xq.push(pq[0]); yq.push(pq[1]);
      }
      return { x4, y4, xc, yc, xd, yd, xq, yq };
    }

    function interp(x, xp, fp, P) {
      const n = xp.length, idx = Array.from({ length: n }, (_, i) => i).sort((a, b) => xp[a] - xp[b]);
      const sx = idx.map(i => xp[i]), sf = idx.map(i => fp[i]);
      let xn = ((x % P) + P) % P, lo = 0, hi = n - 1;
      for (let i = 0; i < n - 1; i++) { if (sx[i] <= xn && sx[i + 1] > xn) { lo = i; hi = i + 1; break; } if (i === n - 2) { lo = n - 1; hi = 0; } }
      const dx = (hi > lo) ? (sx[hi] - sx[lo]) : (sx[hi] + P - sx[lo]);
      const tt = (dx > 1e-15) ? ((xn - sx[lo] + (xn < sx[lo] ? P : 0)) / dx) : 0;
      return sf[lo] + tt * (sf[hi] - sf[lo]);
    }

    // ===== Python epl_shear_njit.py Image Solver Equivalents =====
    const EPS = 1e-16;
    const MAX_ROOTS = 16;
    const MAX_IMGS = 5;

    function signedPower(x, p) {
      if (x === 0) return 0;
      return Math.pow(Math.abs(x), p) * Math.sign(x);
    }

    function ell2pol(rell, theta, q) {
      const phi = Math.atan2(Math.sin(theta) * q, Math.cos(theta));
      const r = rell * Math.sqrt((Math.cos(theta) ** 2) / (q * q) + Math.sin(theta) ** 2);
      return [r, phi];
    }

    function geomlinspace(a, b, N) {
      const ratio = Math.pow(b / a, 1 / (N - 1));
      const delta = a * (ratio - 1);
      let nlin = Math.floor(a / delta);
      if (nlin < 1) nlin = 1;
      if (nlin > N) nlin = N;
      const out = [];
      for (let i = 0; i < nlin; i++) out.push(a * i / nlin);
      for (let i = 0; i < N; i++) out.push(a * Math.pow(ratio, i));
      return out;
    }

    function oneDimLensEqCalcs(args, phi) {
      const { b, t, y1, y2, q, gamma1, gamma2 } = args;
      const y = [y1, y2];
      const den = 1 - gamma1 * gamma1 - gamma2 * gamma2;
      const c = Math.cos(phi), s = Math.sin(phi);
      const rhat = [((1 + gamma1) * c + gamma2 * s) / den, (gamma2 * c + (1 - gamma1) * s) / den];
      const thetahat = [((1 + gamma1) * s - gamma2 * c) / den, (gamma2 * s - (1 - gamma1) * c) / den];
      const [fracRoverrsh, phiell] = pol2ell(1, phi, q);
      const Omega = omega(phiell, t, q);
      const cnst = 2 * b / (1 + q);
      let R;

      if (Math.abs(t - 1) > 1e-4) {
        const denom = cnst * cdot(Omega, thetahat);
        const val = Math.abs(denom) > EPS ? -cdot(y, thetahat) / denom : NaN;
        R = b * signedPower(val, 1 / (1 - t));
      } else {
        const OmegaOrt = [-Omega[1], Omega[0]];
        const xvec = [(1 - gamma1) * c - gamma2 * s, -gamma2 * c + (1 + gamma1) * s];
        const denom = cdot(OmegaOrt, xvec);
        if (Math.abs(denom) > EPS) {
          R = cdot(OmegaOrt, y) / denom * fracRoverrsh;
        } else {
          const rhatSq = cdot(rhat, rhat);
          R = Math.abs(rhatSq) > EPS ? (cdot(y, rhat) + cnst * cdot(Omega, rhat)) / (den * rhatSq) * fracRoverrsh : 0;
        }
      }

      const [r] = ell2pol(R, phiell, q);
      return { Omega, cnst, phiell, q, r, rhat, t, b, thetahat, y };
    }

    function oneDimLensEq(phi, args) {
      const c = oneDimLensEqCalcs(args, phi);
      const [rr] = ell2pol(1, c.phiell, c.q);
      const ip = cdot(c.y, c.rhat) * cdot(c.Omega, c.thetahat) - cdot(c.Omega, c.rhat) * cdot(c.y, c.thetahat);
      return Math.pow(rr * c.b, 2 / c.t - 2) * signedPower(cdot(c.y, c.thetahat) / c.cnst, 2 / c.t) * ip * ip
        + signedPower(ip, 2 / c.t) * cdot(c.Omega, c.thetahat) ** 2;
    }

    function oneDimLensEqUnsmooth(phi, args) {
      const c = oneDimLensEqCalcs(args, phi);
      const [rr] = ell2pol(1, c.phiell, c.q);
      const ip = cdot(c.y, c.rhat) * cdot(c.Omega, c.thetahat) - cdot(c.Omega, c.rhat) * cdot(c.y, c.thetahat);
      return signedPower(rr * c.b, 1 - c.t) * (cdot(c.y, c.thetahat) / c.cnst) * Math.abs(ip) ** c.t
        + ip * Math.abs(cdot(c.Omega, c.thetahat)) ** c.t;
    }

    function oneDimLensEqBoth(thpl, args) {
      const y = [], yNs = [];
      for (const th of thpl) {
        y.push(oneDimLensEq(th, args));
        yNs.push(oneDimLensEqUnsmooth(th, args));
      }
      return [y, yNs];
    }

    function minApprox(x1, x2, x3, y1, y2, y3) {
      const div = 2 * (x3 * (y1 - y2) + x1 * (y2 - y3) + x2 * (-y1 + y3));
      if (!(Math.abs(div) > EPS)) return x2;
      const num = x3 * x3 * (y1 - y2) + x1 * x1 * (y2 - y3) + x2 * x2 * (-y1 + y3);
      return num / div;
    }

    function brentqLensResidual(xa, xb, args, smoothBranch = true, xtol = 2e-14, rtol = 16 * Number.EPSILON, maxiter = 100) {
      let xpre = xa, xcur = xb, xblk = 0, fblk = 0, spre = 0, scur = 0;
      const fn = smoothBranch ? oneDimLensEq : oneDimLensEqUnsmooth;
      let fpre = fn(xpre, args), fcur = fn(xcur, args);
      if (!isFinite(fpre) || !isFinite(fcur) || fpre * fcur > 0) return NaN;
      if (fpre === 0) return xpre;
      if (fcur === 0) return xcur;

      for (let i = 0; i < maxiter; i++) {
        if (fpre * fcur < 0) { xblk = xpre; fblk = fpre; }
        if (Math.abs(fblk) < Math.abs(fcur)) {
          xpre = xcur; xcur = xblk; xblk = xpre;
          fpre = fcur; fcur = fblk; fblk = fpre;
        }
        const delta = 0.5 * (xtol + rtol * Math.abs(xcur));
        const sbis = 0.5 * (xblk - xcur);
        if (fcur === 0 || Math.abs(sbis) < delta) return xcur;

        let useBisect = true, stry = 0;
        if (Math.abs(spre) > delta && Math.abs(fcur) < Math.abs(fpre)) {
          if (xpre === xblk) {
            const denom = fcur - fpre;
            if (Math.abs(denom) >= EPS) { stry = -fcur * (xcur - xpre) / denom; useBisect = false; }
          } else {
            const dpreDen = xpre - xcur, dblkDen = xblk - xcur;
            if (Math.abs(dpreDen) >= EPS && Math.abs(dblkDen) >= EPS) {
              const dpre = (fpre - fcur) / dpreDen;
              const dblk = (fblk - fcur) / dblkDen;
              const denom = dblk * dpre * (fblk - fpre);
              if (Math.abs(denom) >= EPS) { stry = -fcur * (fblk * dblk - fpre * dpre) / denom; useBisect = false; }
            }
          }
          if (!useBisect && 2 * Math.abs(stry) < Math.min(Math.abs(spre), 3 * Math.abs(sbis) - delta)) {
            spre = scur; scur = stry;
          } else {
            spre = sbis; scur = sbis;
          }
        } else {
          spre = sbis; scur = sbis;
        }

        xpre = xcur; fpre = fcur;
        xcur += Math.abs(scur) > delta ? scur : (sbis > 0 ? delta : -delta);
        fcur = fn(xcur, args);
        if (!isFinite(fcur)) return NaN;
      }
      return xcur;
    }

    function getPhi(thpl, args) {
      const [y, yNs] = oneDimLensEqBoth(thpl, args);
      const roots = [], nphi = thpl.length;
      const addRoot = (root) => {
        if (!isFinite(root) || roots.length >= MAX_ROOTS) return;
        const wrapped = ((root % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        roots.push(wrapped);
      };

      for (let i = 0; i < nphi - 1; i++) {
        if (y[i + 1] * y[i] <= 0) addRoot(brentqLensResidual(thpl[i], thpl[i + 1], args));
        else if (yNs[i + 1] * yNs[i] <= 0) addRoot(brentqLensResidual(thpl[i], thpl[i + 1], args, false));
      }

      for (let i = 1; i < nphi + 1; i++) {
        const y1 = y[i - 1], y2 = y[i % nphi], y3 = y[(i + 1) % nphi];
        const y1n = yNs[i - 1], y2n = yNs[i % nphi], y3n = yNs[(i + 1) % nphi];
        if ((y3 - y2) * (y2 - y1) > 0 && (y3n - y2n) * (y2n - y1n) > 0) continue;
        if (y3 * y2 <= 0 || y1 * y2 <= 0) continue;
        if (i > nphi - 2) continue;

        const x1 = thpl[i - 1], x2 = thpl[i], x3 = thpl[i + 1];
        const xmin = minApprox(x1, x2, x3, y1, y2, y3);
        const xminNs = minApprox(x1, x2, x3, y1n, y2n, y3n);
        const ymin = oneDimLensEq(xmin, args);
        const yminNs = oneDimLensEqUnsmooth(xminNs, args);

        if (ymin * y2 <= 0 && x2 <= xmin && xmin <= x3) {
          addRoot(brentqLensResidual(x2, xmin, args));
          addRoot(brentqLensResidual(xmin, x3, args));
        } else if (ymin * y2 <= 0 && x1 <= xmin && xmin <= x2) {
          addRoot(brentqLensResidual(x1, xmin, args));
          addRoot(brentqLensResidual(xmin, x2, args));
        } else if (yminNs * y2n <= 0 && x2 <= xminNs && xminNs <= x3) {
          addRoot(brentqLensResidual(x2, xminNs, args, false));
          addRoot(brentqLensResidual(xminNs, x3, args, false));
        } else if (yminNs * y2n <= 0 && x1 <= xminNs && xminNs <= x2) {
          addRoot(brentqLensResidual(x1, xminNs, args, false));
          addRoot(brentqLensResidual(xminNs, x2, args, false));
        }
      }
      return roots;
    }

    function solveLensEqAligned(b, t, y1, y2, q, gamma1, gamma2, Nmeas = 400, NmeasExtra = 80) {
      const p1 = Math.atan2(y2 * (1 - gamma1) + gamma2 * y1, y1 * (1 + gamma1) + gamma2 * y2);
      const geom = geomlinspace(1e-4, 0.1, NmeasExtra);
      const thpl = [];
      for (let i = 0; i < Nmeas; i++) thpl.push(Math.PI * i / (Nmeas - 1));
      const pmod = ((p1 % Math.PI) + Math.PI) % Math.PI;
      for (const g of geom) thpl.push(pmod - g);
      for (const g of geom) thpl.push(pmod + g);
      thpl.sort((a, b) => a - b);

      const args = { b, t, y1, y2, q, gamma1, gamma2 };
      const roots = getPhi(thpl, args);
      const imgs = [];
      for (const root of roots) {
        for (let addPi = 0; addPi < 2; addPi++) {
          const th = root + addPi * Math.PI;
          const R = oneDimLensEqCalcs(args, th).r;
          if (!(R > 0)) continue;
          const xs = R * Math.cos(th), ys = R * Math.sin(th);
          const a = alpha_es(xs, ys, b, q, t, gamma1, gamma2, omega(Math.atan2(ys, xs * q), t, q));
          const diff = Math.sqrt((xs - a[0] - y1) ** 2 + (ys - a[1] - y2) ** 2);
          if (diff < 1e-8) imgs.push([xs, ys]);
        }
      }

      const unique = [];
      for (const p of imgs) {
        if (!unique.some(u => Math.abs(u[0] - p[0]) < 1e-8 && Math.abs(u[1] - p[1]) < 1e-8)) {
          unique.push(p);
          if (unique.length >= MAX_IMGS) break;
        }
      }
      return unique;
    }

    function eplFunction(x, y, b, t, q, Omega) {
      const R = cabs([x * q, y]);
      if (R < EPS) return 0;
      const alph = cscale((2 / (1 + q)) * Math.pow(b / R, t) * R, Omega);
      return (x * alph[0] + y * alph[1]) / (2 - t);
    }

    function shearFunction(x, y, gamma1, gamma2) {
      return 0.5 * (gamma1 * x * x + 2 * gamma2 * x * y - gamma1 * y * y);
    }

    function lensingDiagnostics(zx, zy, b, t, gamma1, gamma2, q, phi, Omega) {
      const ang = Math.atan2(zy, zx);
      const R = cabs([zx * q, zy]);
      let u = R > EPS ? Math.pow(b / R, t) : 1e10;
      if (u > 1e10) u = 1e10;
      const kappa = 0.5 * (2 - t);
      const Roverr = Math.sqrt(Math.cos(ang) ** 2 * q * q + Math.sin(ang) ** 2);
      const alph = cscale(2 / (1 + q), Omega);
      const term1 = cscale(-kappa, cexp_i(2 * (ang + phi)));
      const term2 = cscale((1 - t) * Roverr, cmul(cexp_i(ang + 2 * phi), alph));
      const gammaShear = cadd(term1, term2);

      const fxx = (kappa + gammaShear[0]) * u + gamma1;
      const fyy = (kappa - gammaShear[0]) * u - gamma1;
      const fxy = gammaShear[1] * u + gamma2;
      const detA = (1 - fxx) * (1 - fyy) - fxy * fxy;
      const traceA = 2 - fxx - fyy;
      if (Math.abs(detA) < EPS) return { mu: 10000, type: 0 };
      const mu = 1 / detA;
      let type = 0;
      if (detA < 0) type = 2;
      else if (traceA > 0) type = 1;
      else if (traceA < 0) type = 3;
      return { mu, type };
    }

    function typeLabel(code) {
      if (code === 1) return 'I';
      if (code === 2) return 'II';
      if (code === 3) return 'III';
      return '0';
    }

    function findImages(bx, by, qi, pi, gp, g1u, g2u) {
      const t = gp - 1, b = Math.sqrt(qi);
      const cp = Math.cos(pi), sp = Math.sin(pi);
      const c2p = cp * cp - sp * sp, s2p = 2 * cp * sp;
      const bl = [bx * cp + by * sp, -bx * sp + by * cp];
      const g1Rot = g1u * c2p + g2u * s2p;
      const g2Rot = -g1u * s2p + g2u * c2p;
      const imgs = solveLensEqAligned(b, t, bl[0], bl[1], qi, g1Rot, g2Rot);

      const res = [];
      for (const [xRot, yRot] of imgs) {
        const xSky = xRot * cp - yRot * sp;
        const ySky = xRot * sp + yRot * cp;
        const O = omega(Math.atan2(yRot, xRot * qi), t, qi);
        const diag = lensingDiagnostics(xRot, yRot, b, t, g1u, g2u, qi, pi, O);
        const tau = 0.5 * ((xSky - bx) ** 2 + (ySky - by) ** 2)
          - eplFunction(xRot, yRot, b, t, qi, O)
          - shearFunction(xSky, ySky, g1u, g2u);
        if (!isFinite(diag.mu) || Math.abs(diag.mu) >= 0.01) {
          res.push({ x: xSky, y: ySky, mu: Math.abs(diag.mu), type: typeLabel(diag.type), tau });
        }
      }
      res.sort((a, b) => a.tau - b.tau);
      return res;
    }

    // ===== Drawing Mechanics =====
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const DPR = window.devicePixelRatio || 1;

    const LIGHT_BG = '#F5F6FA';
    const GRID_COL = '#FFFFFF';
    const SERIF = '"Source Serif 4","Crimson Pro","Georgia","Times New Roman",serif';

    const MARGIN = { top: 38, right: 14, bottom: 54, left: 58 };
    const PLOT_W = 520 - MARGIN.left - MARGIN.right;
    const PLOT_H = PLOT_W; 
    const TW = 520, TH = MARGIN.top + PLOT_H + MARGIN.bottom;
    
    canvas.width = TW * DPR; canvas.height = TH * DPR;
    canvas.style.width = TW + 'px'; canvas.style.height = TH + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const iCols = ['#1E88E5', '#7E57C2', '#8D6E63', '#616161'];
    const dim = 1.3; 
    const theta_E_1e6 = theta_E_phys * 1e6; 

    function w2p(wx, wy) { return [MARGIN.left + (wx / dim + 1) / 2 * PLOT_W, MARGIN.top + (1 - (wy / dim + 1) / 2) * PLOT_H]; }

    function drawPlot() {
      const q = +document.getElementById('s_q').value;
      const phi = +document.getElementById('s_phi').value;
      const gamma = +document.getElementById('s_gamma').value;
      const g1 = +document.getElementById('s_g1').value;
      const g2 = +document.getElementById('s_g2').value;
      const bx = +document.getElementById('s_bx').value;
      const by = +document.getElementById('s_by').value;
      
      document.getElementById('v_q').textContent = q.toFixed(2);
      document.getElementById('v_phi').textContent = phi.toFixed(2);
      document.getElementById('v_gamma').textContent = gamma.toFixed(2);
      document.getElementById('v_g1').textContent = g1.toFixed(2);
      document.getElementById('v_g2').textContent = g2.toFixed(2);
      document.getElementById('v_bx').textContent = bx.toFixed(2);
      document.getElementById('v_by').textContent = by.toFixed(2);

      const cau = computeCaustics(q, phi, gamma, g1, g2);
      const imgs = findImages(bx, by, q, phi, gamma, g1, g2);

      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, TW, TH);

      ctx.fillStyle = '#222';
      ctx.font = `bold 14px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('Interactive Lens Configuration (θ\u0045 \u2248 ' + theta_E_phys.toExponential(1) + ' rad)', TW / 2, MARGIN.top - 6);

      ctx.fillStyle = LIGHT_BG;
      ctx.fillRect(MARGIN.left, MARGIN.top, PLOT_W, PLOT_H);

      const tickPhys = [-2, -1, 0, 1, 2];
      const tvs = tickPhys.map(t => t / theta_E_1e6);
      
      ctx.strokeStyle = GRID_COL;
      ctx.lineWidth = 2.0;
      ctx.setLineDash([]);
      
      for (const v of tvs) {
        const [gx] = w2p(v, 0);
        ctx.beginPath(); ctx.moveTo(gx, MARGIN.top); ctx.lineTo(gx, MARGIN.top + PLOT_H); ctx.stroke();
      }
      for (const v of tvs) {
        const [, gy] = w2p(0, v);
        ctx.beginPath(); ctx.moveTo(MARGIN.left, gy); ctx.lineTo(MARGIN.left + PLOT_W, gy); ctx.stroke();
      }

      ctx.save(); ctx.beginPath(); ctx.rect(MARGIN.left, MARGIN.top, PLOT_W, PLOT_H); ctx.clip();

      ctx.strokeStyle = '#1E88E5'; ctx.lineWidth = 3.0; ctx.setLineDash([4, 5]);
      const [ex, ey] = w2p(0, 0);
      ctx.beginPath(); ctx.arc(ex, ey, (1 / dim) * (PLOT_W / 2), 0, 2 * Math.PI); ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = '#FB8C00'; ctx.lineWidth = 2.8; ctx.setLineDash([10, 6]);
      drawCurve(cau.xd, cau.yd, true); ctx.setLineDash([]);

      ctx.strokeStyle = '#43A047'; ctx.lineWidth = 2.8;
      drawCurve(cau.xq, cau.yq, true);

      const [sx, sy] = w2p(bx, by);
      ctx.strokeStyle = '#E53935'; ctx.lineWidth = 3.0;
      const cs = 9;
      ctx.beginPath(); ctx.moveTo(sx - cs, sy - cs); ctx.lineTo(sx + cs, sy + cs); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx - cs, sy + cs); ctx.lineTo(sx + cs, sy - cs); ctx.stroke();

      for (let i = 0; i < imgs.length; i++) {
        const [ix, iy] = w2p(imgs[i].x, imgs[i].y);
        drawStar(ix, iy, 11, iCols[i % iCols.length]);
      }
      ctx.restore();

      ctx.fillStyle = '#333';
      ctx.font = `13px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      for (let ti = 0; ti < tvs.length; ti++) {
        const [tx] = w2p(tvs[ti], 0);
        ctx.fillText(tickPhys[ti].toString(), tx, MARGIN.top + PLOT_H + 5);
      }
      
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      for (let ti = 0; ti < tvs.length; ti++) {
        const [, ty] = w2p(0, tvs[ti]);
        ctx.fillText(tickPhys[ti].toString(), MARGIN.left - 7, ty);
      }

      ctx.font = `12px ${SERIF}`;
      ctx.fillStyle = '#333';
      ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      ctx.fillText('×10\u207B\u2076', MARGIN.left - 5, MARGIN.top - 2);
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText('×10\u207B\u2076', MARGIN.left + PLOT_W + 5, MARGIN.top + PLOT_H + 18);

      ctx.fillStyle = '#222';
      ctx.font = `15px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('x [rad]', MARGIN.left + PLOT_W / 2, MARGIN.top + PLOT_H + 30);
      ctx.save(); ctx.translate(14, MARGIN.top + PLOT_H / 2); ctx.rotate(-Math.PI / 2);
      ctx.textBaseline = 'top'; ctx.fillText('y [rad]', 0, 0); ctx.restore();

      let lg = '<div class="legend-title">Lens Configuration</div>';
      lg += '<div class="legend-item"><span class="legend-swatch" style="border-top:3px dashed #FB8C00"></span> Double Caustic</div>';
      lg += '<div class="legend-item"><span class="legend-swatch" style="border-top:3px solid #43A047"></span> Quad Caustic</div>';
      lg += '<div class="legend-item"><span class="legend-swatch" style="border-top:3px dotted #1E88E5"></span> Einstein Ring</div>';
      lg += '<div class="legend-item"><span style="color:#E53935;font-weight:bold;font-size:15px;min-width:26px;text-align:center;">✕</span> Source</div>';
      
      for (let i = 0; i < imgs.length; i++) {
        const im = imgs[i];
        const dt_days = (im.tau - imgs[0].tau) * TD_FACTOR;
        lg += `<div class="legend-item"><span class="legend-star" style="color:${iCols[i % iCols.length]}">★</span><span class="legend-img-detail"><b>Image ${i + 1}:</b> Type ${im.type},<br>Δt<span class="legend-sub">1,${i + 1}</span> ≈ ${dt_days.toFixed(1)} days,<br>| μ<span class="legend-sub">${i + 1}</span> | = ${im.mu.toFixed(1)}</span></div>`;
      }
      document.getElementById('legend').innerHTML = lg;
    }

    function drawCurve(xs, ys, close) {
      ctx.beginPath(); let s = false;
      for (let i = 0; i < xs.length; i++) {
        if (!isFinite(xs[i]) || !isFinite(ys[i])) { s = false; continue; }
        const [cx, cy] = w2p(xs[i], ys[i]);
        if (!s) { ctx.moveTo(cx, cy); s = true; } else ctx.lineTo(cx, cy);
      }
      if (close && s) { for (let i = 0; i < xs.length; i++) { if (isFinite(xs[i]) && isFinite(ys[i])) { const [cx, cy] = w2p(xs[i], ys[i]); ctx.lineTo(cx, cy); break; } } }
      ctx.stroke();
    }

    function drawStar(cx, cy, r, col) {
      ctx.fillStyle = col; ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = Math.PI / 2 + i * Math.PI / 5, rd = (i % 2 === 0) ? r : r * 0.4;
        const x = cx + rd * Math.cos(a), y = cy - rd * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.fill();
    }

    ['s_q', 's_phi', 's_gamma', 's_g1', 's_g2', 's_bx', 's_by'].forEach(id =>
      document.getElementById(id).addEventListener('input', drawPlot));
    drawPlot();
  </script>
</body>
